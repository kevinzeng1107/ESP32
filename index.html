<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 MQTT 控制面板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        #conn-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 36px;
        }
        #conn-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.4s;
        }
        #conn-dot.connected  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
        #conn-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .card {
            background: #1e2230;
            border: 1px solid #2d3348;
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 16px;
        }
        .card h3 {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 20px;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 14px; border-radius: 10px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-on  { background: #fde047; color: #1a1200; }
        .btn-on:hover  { background: #fef08a; }
        .btn-on:disabled  { background: #3d3a1a; color: #6b6430; cursor: not-allowed; }
        .btn-off { background: #1e2230; color: #94a3b8; border: 1px solid #2d3348; }
        .btn-off:hover { background: #2d3348; color: #e2e8f0; }
        .btn-off:disabled { opacity: 0.4; cursor: not-allowed; }

        .led-indicator {
            display: flex; align-items: center; gap: 10px;
            margin-top: 16px; padding: 12px 14px;
            background: #151821; border-radius: 8px;
            font-size: 0.85rem; color: #64748b;
        }
        #led-bulb { font-size: 1.4rem; transition: filter 0.3s; filter: grayscale(1) brightness(0.5); }
        #led-bulb.on { filter: grayscale(0) brightness(1.2); }

        #buttonStatus {
            font-size: 1.1rem; font-weight: 600;
            padding: 20px; text-align: center; border-radius: 10px;
            background: #151821; color: #64748b;
            transition: all 0.3s; letter-spacing: 0.3px;
            border: 1px solid transparent;
        }
        #buttonStatus.pressed  { background: #1a2e1a; color: #4ade80; border-color: #22c55e44; }
        #buttonStatus.released { background: #1e1a2e; color: #818cf8; border-color: #6366f144; }

        .log-box {
            background: #151821; border-radius: 8px; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 0.75rem;
            color: #475569; max-height: 120px; overflow-y: auto;
            margin-top: 16px; text-align: left; line-height: 1.8;
        }
        .log-ok   { color: #22c55e; }
        .log-warn { color: #f59e0b; }
        .log-err  { color: #ef4444; }
        .log-recv { color: #60a5fa; }
    </style>
</head>
<body>

<h1>ESP32 控制面板</h1>

<div id="conn-status">
    <div id="conn-dot" class="connecting"></div>
    <span id="conn-text">正在連線到 MQTT 伺服器...</span>
</div>

<div class="card">
    <h3>LED 控制</h3>
    <div class="btn-group">
        <button class="btn btn-on"  id="btn-on"  onclick="sendLedCommand('ON')"  disabled>打開 LED</button>
        <button class="btn btn-off" id="btn-off" onclick="sendLedCommand('OFF')" disabled>關閉 LED</button>
    </div>
    <div class="led-indicator">
        <span id="led-bulb">💡</span>
        <span id="led-state-text">LED 狀態未知</span>
    </div>
</div>

<div class="card">
    <h3>ESP32 實體按鈕狀態</h3>
    <div id="buttonStatus">等待按鈕訊號...</div>
</div>

<div class="card">
    <h3>訊息記錄</h3>
    <div class="log-box" id="log"></div>
</div>

<script>
    const broker   = "broker.emqx.io";
    const port     = 8084;
    const clientId = "web_" + Math.random().toString(16).substr(2, 8);
    const topicLedControl   = "myhome/esp32/led";
    const topicButtonStatus = "myhome/esp32/button";

    let reconnectTimer = null;

    function log(msg, type = '') {
        const box  = document.getElementById('log');
        const line = document.createElement('div');
        if (type) line.className = 'log-' + type;
        const now = new Date().toLocaleTimeString('zh-TW');
        line.textContent = `[${now}] ${msg}`;
        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
    }

    function setConnStatus(state, text) {
        document.getElementById('conn-dot').className  = state;
        document.getElementById('conn-text').textContent = text;
        document.querySelectorAll('.btn').forEach(b => b.disabled = state !== 'connected');
    }

    const client = new Paho.MQTT.Client(broker, port, clientId);

    client.onConnectionLost = function(res) {
        setConnStatus('connecting', '連線中斷，5 秒後重連...');
        log('連線中斷：' + res.errorMessage, 'err');
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 5000);
    };

    client.onMessageArrived = function(message) {
        const topic   = message.destinationName;
        const payload = message.payloadString;
        log('收到 [' + topic + '] → ' + payload, 'recv');

        if (topic === topicButtonStatus) {
            const el = document.getElementById('buttonStatus');
            if (payload === 'PRESSED') {
                el.textContent = '🟢 按鈕已按下 (PRESSED)';
                el.className   = 'pressed';
            } else if (payload === 'RELEASED') {
                el.textContent = '🔵 按鈕已放開 (RELEASED)';
                el.className   = 'released';
            } else {
                el.textContent = payload;
                el.className   = '';
            }
        }
    };

    function connect() {
        setConnStatus('connecting', '正在連線到 MQTT 伺服器...');
        log('嘗試連線... clientId=' + clientId, 'warn');
        try {
            client.connect({
                useSSL: true,
                timeout: 10,
                onSuccess: function() {
                    setConnStatus('connected', '已連線（加密）broker.emqx.io:8084');
                    log('MQTT 連線成功！', 'ok');
                    client.subscribe(topicButtonStatus);
                    log('已訂閱：' + topicButtonStatus, 'ok');
                },
                onFailure: function(err) {
                    setConnStatus('connecting', '連線失敗，5 秒後重試...');
                    log('連線失敗：' + err.errorMessage, 'err');
                    clearTimeout(reconnectTimer);
                    reconnectTimer = setTimeout(connect, 5000);
                }
            });
        } catch(e) {
            log('例外錯誤：' + e.message, 'err');
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connect, 5000);
        }
    }

    function sendLedCommand(state) {
        if (!client.isConnected()) {
            log('尚未連線，無法發送指令', 'err');
            return;
        }
        const msg = new Paho.MQTT.Message(state);
        msg.destinationName = topicLedControl;
        client.send(msg);
        log('已發送 [' + topicLedControl + '] → ' + state, 'ok');

        const bulb = document.getElementById('led-bulb');
        const text = document.getElementById('led-state-text');
        if (state === 'ON') {
            bulb.classList.add('on');
            text.textContent = 'LED 已開啟';
        } else {
            bulb.classList.remove('on');
            text.textContent = 'LED 已關閉';
        }
    }

    connect();
</script>
</body>
</html>
