<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESP32 控制面板 (8813BF246EB4)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        /* 保持你的漂亮 UI 樣式 */
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .card { background: #1e2230; border: 1px solid #2d3348; border-radius: 16px; padding: 28px; width: 100%; max-width: 400px; margin-bottom: 16px; text-align: center; }
        #conn-status { margin-bottom: 20px; font-size: 0.9rem; color: #94a3b8; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-on { background: #fde047; color: #1a1200; }
        .btn-off { background: #334155; color: #f8fafc; }
        #buttonStatus { margin-top: 10px; padding: 15px; border-radius: 8px; background: #151821; font-weight: bold; }
        .pressed { color: #4ade80; border: 1px solid #4ade80; }
        .released { color: #818cf8; border: 1px solid #818cf8; }
    </style>
</head>
<body>

<h1>ESP32 控制</h1>
<div id="conn-status">📡 狀態：<span id="conn-text">準備連線...</span></div>

<div class="card">
    <div class="btn-group">
        <button class="btn btn-on" onclick="sendCmd('ON')">打開 LED</button>
        <button class="btn btn-off" onclick="sendCmd('OFF')">關閉 LED</button>
    </div>
</div>

<div class="card">
    <div id="buttonStatus">等待按鈕訊號...</div>
</div>

<script>
    // 直接固定參數
    const broker = "broker.emqx.io";
    const port = 8084;
    const deviceID = "8813BF246EB4"; 
    const topicLed = `myhome/esp32/${deviceID}/led`;
    const topicBtn = `myhome/esp32/${deviceID}/button`;

    const client = new Paho.MQTT.Client(broker, port, "web_" + Math.random().toString(16).slice(2, 10));

    client.onMessageArrived = (msg) => {
        const el = document.getElementById('buttonStatus');
        if (msg.payloadString === 'PRESSED') {
            el.textContent = '🟢 按鈕按下';
            el.className = 'pressed';
        } else {
            el.textContent = '🔵 按鈕放開';
            el.className = 'released';
        }
    };

    function connect() {
        client.connect({
            useSSL: true,
            onSuccess: () => {
                document.getElementById('conn-text').textContent = "✅ 已連接設備 " + deviceID;
                client.subscribe(topicBtn);
            },
            onFailure: () => {
                document.getElementById('conn-text').textContent = "❌ 連線失敗，重試中...";
                setTimeout(connect, 5000);
            }
        });
    }

    function sendCmd(state) {
        if (!client.isConnected()) return;
        const message = new Paho.MQTT.Message(state);
        message.destinationName = topicLed;
        client.send(message);
    }

    // 網頁開啟自動執行
    connect();
</script>
</body>
</html>
