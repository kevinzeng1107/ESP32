<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESP32 MQTT 專屬控制面板</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        /* ... 保留大部分原始 CSS ... */
        body { font-family: sans-serif; background: #0f1117; color: #e2e8f0; padding: 20px; }
        .card { background: #1e2230; border-radius: 16px; padding: 20px; max-width: 420px; margin: 10px auto; border: 1px solid #2d3348; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #2d3348; background: #151821; color: white; }
        .btn-set { background: #6366f1; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }
        /* (其餘按鈕樣式參考原始碼)  */
    </style>
</head>
<body>

<div class="card">
    <h3>設備連線設定</h3>
    <div class="input-group">
        <input type="text" id="macInput" placeholder="請輸入設備 MAC (如 AABBCCDDEEFF)">
        <button class="btn-set" onclick="updateDeviceConfig()">設定設備</button>
    </div>
    <div id="conn-status">
        <div id="conn-dot"></div>
        <span id="conn-text">請先設定設備 ID</span>
    </div>
</div>

<div class="card">
    <h3>LED 控制 (<span id="display-id">未設定</span>)</h3>
    <div class="btn-group">
        <button class="btn btn-on" id="btn-on" onclick="sendLedCommand('ON')" disabled>開啟</button>
        <button class="btn btn-off" id="btn-off" onclick="sendLedCommand('OFF')" disabled>關閉</button>
    </div>
</div>

<div class="card">
    <h3>實體按鈕狀態</h3>
    <div id="buttonStatus">等待訊號...</div>
</div>

<script>
    const broker = "broker.emqx.io";
    const port = 8084;
    let deviceID = ""; 
    let topicLedControl = "";
    let topicButtonStatus = "";
    let client = null;

    function updateDeviceConfig() {
        const input = document.getElementById('macInput').value.trim();
        if(!input) { alert("請輸入有效的 MAC 位址"); return; }
        
        deviceID = input;
        topicLedControl = `myhome/esp32/${deviceID}/led`;
        topicButtonStatus = `myhome/esp32/${deviceID}/button`;
        document.getElementById('display-id').textContent = deviceID;
        
        if(client) client.disconnect();
        initMqtt(); // 重新連線並訂閱新主題 
    }

    function initMqtt() {
        const clientId = "web_" + Math.random().toString(16).substr(2, 8);
        client = new Paho.MQTT.Client(broker, port, clientId); [cite: 2]

        client.onMessageArrived = function(message) {
            if (message.destinationName === topicButtonStatus) { [cite: 2]
                const el = document.getElementById('buttonStatus');
                el.textContent = message.payloadString === 'PRESSED' ? '🟢 已按下' : '🔵 已放開';
                el.className = message.payloadString.toLowerCase();
            }
        };

        client.connect({
            useSSL: true,
            onSuccess: function() {
                document.getElementById('conn-text').textContent = "已連線至 " + deviceID;
                document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                client.subscribe(topicButtonStatus); [cite: 2]
            }
        });
    }

    function sendLedCommand(state) {
        if (!client || !client.isConnected()) return;
        const msg = new Paho.MQTT.Message(state);
        msg.destinationName = topicLedControl; [cite: 2]
        client.send(msg);
    }
</script>
</body>
</html>
