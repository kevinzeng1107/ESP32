<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESP32 藍牙 VU 表</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* VU 表樣式 */
        .vu-meter {
            width: 300px;
            height: 40px;
            background: #333;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px auto;
            border: 4px solid #555;
        }
        #bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #4caf50 60%, #ffeb3b 85%, #f44336 100%);
            transition: width 0.1s ease-out; /* 讓長條移動更平滑 */
        }
        
        button {
            padding: 10px 20px; font-size: 18px; cursor: pointer;
            background: #008CBA; color: white; border: none; border-radius: 5px; // 
        }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>ESP32 觸控 VU 表</h1>
    
    <div class="vu-meter">
        <div id="bar"></div>
    </div>
    
    <p>類比讀值: <span id="val" style="font-size: 24px; color: #d32f2f;">0</span></p>
    
    <button id="connectBtn" onclick="connectBLE()">連接 ESP32 藍牙</button>
    <div id="status">狀態: 未連線</div>
</div>

<script>
    // UUID 必須與 ESP32 一致 [cite: 273, 275]
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    async function connectBLE() {
        try {
            console.log('正在搜尋藍牙裝置...');
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32_Dino' }], // [cite: 247, 325]
                optionalServices: [SERVICE_UUID]
            });

            document.getElementById('status').innerText = "狀態: 連線中...";
            const server = await device.gatt.connect(); // 
            const service = await server.getPrimaryService(SERVICE_UUID); // 
            const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID); // 

            // 啟動通知接收 
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleNotifications);

            document.getElementById('status').innerText = "狀態: 已連接";
            document.getElementById('status').style.color = "#4caf50";
            document.getElementById('connectBtn').disabled = true;
            alert("藍牙連接成功！"); // 

        } catch (error) {
            console.error('連線失敗:', error);
            document.getElementById('status').innerText = "狀態: 連線失敗";
            alert("藍牙連線失敗，請確認藍牙已開啟。"); // 
        }
    }

    // 處理從 ESP32 傳來的數據
    function handleNotifications(event) {
        let value = new TextDecoder().decode(event.target.value); // 解碼字串
        let intValue = parseInt(value);
        
        // 更新文字數值
        document.getElementById('val').innerText = intValue;
        
        // 更新 VU 表 (ESP32 ADC 為 0-4095)
        let percentage = (intValue / 4095) * 100;
        if (percentage > 100) percentage = 100;
        
        document.getElementById('bar').style.width = percentage + "%";
    }
</script>

</body>
</html>
